name: Release

# Publishes @syntronic/ngx-highlight to npm when a GitHub Release is published.
# Authentication uses npm Trusted Publishing (OIDC) — no NPM_TOKEN required.
# See RELEASING.md for the one-time setup and the release procedure.

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance / OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted publishing requires npm >= 11.5.1; Node 22 ships an older npm.
      - run: npm install -g npm@latest

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run lint

      - run: npm run test

      - run: npm run build

      # Guard against a mismatch between the release tag and the library version.
      - name: Verify release tag matches package version
        run: |
          PKG_VERSION="$(node -p "require('./dist/ngx-highlight/package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          echo "package.json version: $PKG_VERSION"
          echo "release tag (normalized): $TAG"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::Release tag ($GITHUB_REF_NAME) does not match package version ($PKG_VERSION). Bump projects/ngx-highlight/package.json to match the tag."
            exit 1
          fi

      - name: Publish to npm
        run: npm publish
        working-directory: dist/ngx-highlight
